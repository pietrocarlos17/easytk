<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="380" cy="140" r="100" fill="#1f1f1f" opacity="0.6"/>
  <circle cx="100" cy="430" r="70" fill="#1f1f1f" opacity="0.4"/>
  <!-- T letter (red) -->
  <text x="80" y="310" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="260" fill="#fe2c55">T</text>
  <!-- K letter (white) -->
  <text x="240" y="310" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="260" fill="#ffffff">K</text>
  <!-- Red dots -->
  <circle cx="390" cy="110" r="8" fill="#fe2c55"/>
  <circle cx="415" cy="110" r="8" fill="#fe2c55"/>
  <circle cx="440" cy="110" r="8" fill="#fe2c55"/>
  <!-- Red line -->
  <rect x="120" y="370" width="270" height="3" rx="1.5" fill="#8b1a2f"/>
  <!-- MANAGER text -->
  <text x="140" y="420" font-family="Arial, sans-serif" font-weight="800" font-size="52" fill="#ffffff" letter-spacing="6">MANAGER</text>
  <!-- EASY TKT text -->
  <text x="175" y="460" font-family="Arial, sans-serif" font-weight="400" font-size="30" fill="#6b7280" letter-spacing="8">EASY TKT</text>
</svg>
